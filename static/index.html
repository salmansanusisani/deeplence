<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepLence — Forensic Media Desk</title>
<style>
  :root {
    --ink: #0f0f0f;
    --paper: #f7f7f2;
    --paper-2: #ecece5;
    --line: #111111;
    --muted: #4d4d4d;
    --accent: #111111;
    --red: #111111;
    --amber: #111111;
    --green: #111111;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    padding: 24px 16px 36px;
    font-family: "Courier New", Courier, monospace;
    color: var(--ink);
    background:
      radial-gradient(circle at top left, rgba(0,0,0,.03) 0 18%, transparent 19%),
      linear-gradient(135deg, #f0f0ea 0%, #e2e2da 100%);
  }

  .wrap {
    max-width: 920px;
    margin: 0 auto;
  }

  .case-file {
    position: relative;
    background: linear-gradient(180deg, #fdfdf9 0%, #ecece4 100%);
    border: 2px solid var(--line);
    box-shadow: 0 18px 42px rgba(0, 0, 0, 0.14);
    overflow: hidden;
  }

  .case-file::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      180deg,
      rgba(0, 0, 0, 0.02) 0 1px,
      transparent 1px 10px
    );
    opacity: 0.35;
  }

  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    padding: 24px 28px 16px;
    border-bottom: 2px solid var(--line);
    background: rgba(255,255,255,0.24);
  }

  .brand h1 {
    margin: 0;
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    letter-spacing: 0.22rem;
    text-transform: uppercase;
    font-weight: 700;
  }

  .brand .tagline {
    margin-top: 6px;
    color: var(--muted);
    font-size: 0.74rem;
    letter-spacing: 0.26rem;
    text-transform: uppercase;
  }

  .meta {
    text-align: right;
    font-size: 0.72rem;
    letter-spacing: 0.2rem;
    color: var(--muted);
    text-transform: uppercase;
  }

  .meta .stamp {
    display: inline-block;
    margin-top: 8px;
    padding: 6px 10px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.7);
  }

  .main {
    padding: 24px 28px 30px;
  }

  .dropzone {
    border: 2px dashed var(--line);
    padding: 24px 18px;
    text-align: center;
    background: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease;
  }

  .dropzone.drag {
    border-color: var(--accent);
    background: rgba(0,0,0,0.08);
  }

  .dropzone .folder {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    font-size: 0.96rem;
    letter-spacing: 0.24rem;
    text-transform: uppercase;
    font-weight: 700;
  }

  .dropzone .folder-icon {
    padding: 8px 10px;
    border: 1px solid var(--line);
    background: #e8dfd0;
    font-size: 1.2rem;
  }

  .dropzone p {
    margin: 6px 0 0;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.12rem;
    text-transform: uppercase;
  }

  input[type="file"] { display: none; }

  .preview {
    margin-top: 20px;
    text-align: center;
  }

  .preview img,
  .preview video {
    max-width: 100%;
    max-height: 320px;
    border: 2px solid var(--line);
    box-shadow: 0 10px 24px rgba(0,0,0,0.12);
    background: #fff;
  }

  .loading-panel {
    margin-top: 20px;
    padding: 18px 18px 20px;
    border: 1px solid var(--line);
    background: #eeeeea;
  }

  .loading-title {
    font-size: 0.8rem;
    letter-spacing: 0.24rem;
    text-transform: uppercase;
    color: var(--muted);
  }

  .loading-bars {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .loading-bars span {
    width: 10px;
    height: 22px;
    background: var(--ink);
    animation: scan 1.05s ease-in-out infinite;
  }

  .loading-bars span:nth-child(2) { animation-delay: 0.13s; }
  .loading-bars span:nth-child(3) { animation-delay: 0.26s; }
  .loading-bars span:nth-child(4) { animation-delay: 0.39s; }
  .loading-bars span:nth-child(5) { animation-delay: 0.52s; }

  .loading-copy {
    margin: 10px 0 0;
    font-size: 0.82rem;
    letter-spacing: 0.14rem;
    text-transform: uppercase;
    color: var(--muted);
  }

  @keyframes scan {
    0%, 100% { transform: scaleY(0.45); opacity: 0.45; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  .result {
    margin-top: 20px;
    padding: 22px;
    border: 2px solid var(--line);
    background: linear-gradient(180deg, #fefefc 0%, #efefe8 100%);
  }

  .result.dossier {
    margin-top: 20px;
    padding: 24px;
    border: 2px solid var(--line);
    background:
      linear-gradient(180deg, rgba(255,255,255,0.96), rgba(243,242,236,0.98)),
      radial-gradient(circle at top left, rgba(0,0,0,.04) 0 12%, transparent 13%);
    box-shadow: 0 14px 34px rgba(17, 17, 17, 0.08);
    position: relative;
    overflow: hidden;
  }

  .result.dossier::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(180deg, rgba(17,17,17,.02) 0 1px, transparent 1px 8px);
    opacity: 0.35;
  }

  .report-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
    position: relative;
    z-index: 1;
  }

  .report-kicker {
    margin-bottom: 6px;
    color: var(--muted);
    font-size: 0.68rem;
    letter-spacing: 0.2rem;
    text-transform: uppercase;
  }

  .report-head h2 {
    margin: 0;
    font-size: 1rem;
    letter-spacing: 0.22rem;
    text-transform: uppercase;
  }

  .stamp-stack {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .stamp {
    padding: 6px 10px;
    border: 1px solid var(--line);
    font-size: 0.68rem;
    letter-spacing: 0.16rem;
    text-transform: uppercase;
    background: rgba(255,255,255,0.75);
  }

  .stamp.warning {
    border-color: #c21f1f;
    color: #c21f1f;
  }

  .case-summary,
  .dossier-card {
    margin-top: 16px;
    padding: 16px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.72);
    position: relative;
    z-index: 1;
  }

  .case-summary h3,
  .dossier-card h3 {
    margin: 0 0 12px;
    font-size: 0.8rem;
    letter-spacing: 0.18rem;
    text-transform: uppercase;
  }

  .summary-grid,
  .detail-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .summary-grid > div,
  .detail-grid > div {
    padding: 10px;
    border: 1px solid rgba(17,17,17,0.2);
    background: rgba(255,255,255,0.7);
  }

  .summary-grid span,
  .detail-grid span {
    display: block;
    margin-bottom: 6px;
    color: var(--muted);
    font-size: 0.64rem;
    letter-spacing: 0.16rem;
    text-transform: uppercase;
  }

  .summary-grid strong,
  .detail-grid strong {
    font-size: 0.82rem;
    letter-spacing: 0.04rem;
  }

  .summary-text,
  .dossier-card p,
  .field strong,
  .field span {
    color: var(--muted);
    font-size: 0.78rem;
    line-height: 1.6;
  }

  .summary-text {
    margin: 12px 0 0;
  }

  .findings-list,
  .evidence-list {
    display: grid;
    gap: 10px;
  }

  .finding-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding-top: 10px;
    border-top: 1px solid rgba(17,17,17,0.2);
  }

  .finding-item:first-child {
    padding-top: 0;
    border-top: 0;
  }

  .finding-label {
    font-size: 0.78rem;
    letter-spacing: 0.14rem;
    text-transform: uppercase;
  }

  .status-badge {
    display: inline-block;
    padding: 4px 8px;
    border: 1px solid var(--line);
    font-size: 0.64rem;
    letter-spacing: 0.14rem;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .status-badge.completed {
    background: var(--line);
    color: #f7f7f2;
  }

  .status-badge.unavailable {
    background: #ecece5;
    color: var(--muted);
  }

  .status-badge.warning {
    border-color: #c21f1f;
    color: #c21f1f;
  }

  .evidence-entry {
    padding: 12px;
    border: 1px solid rgba(17,17,17,0.2);
    background: rgba(255,255,255,0.7);
  }

  .evidence-header {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: center;
    margin-bottom: 8px;
  }

  .evidence-title {
    font-size: 0.78rem;
    letter-spacing: 0.16rem;
    text-transform: uppercase;
    font-weight: 700;
  }

  .evidence-meta {
    color: var(--muted);
    font-size: 0.66rem;
    letter-spacing: 0.14rem;
    text-transform: uppercase;
  }

  .evidence-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-top: 8px;
  }

  .field {
    padding: 8px 0;
    border-top: 1px solid rgba(17,17,17,0.1);
  }

  .field span {
    display: block;
    margin-bottom: 4px;
    font-size: 0.64rem;
    letter-spacing: 0.14rem;
    text-transform: uppercase;
  }

  .field strong {
    color: var(--ink);
    font-size: 0.76rem;
    line-height: 1.4;
  }

  .risk-meter {
    margin-top: 14px;
  }

  .risk-meter .meter-track {
    height: 12px;
    border: 1px solid var(--line);
    background: #f1dede;
    overflow: hidden;
  }

  .risk-meter .meter-fill {
    height: 100%;
    transition: width 0.35s ease;
    background: #c21f1f;
  }

  .risk-meter .meter-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    color: var(--muted);
    font-size: 0.68rem;
    letter-spacing: 0.16rem;
    text-transform: uppercase;
  }

  .readiness {
    margin-top: 10px;
    padding: 8px 10px;
    border-left: 3px solid var(--line);
    background: rgba(0,0,0,.03);
    color: var(--muted);
    font-size: 0.74rem;
    line-height: 1.45;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    position: relative;
    z-index: 1;
  }

  .reset-btn,
  .verify-link {
    display: inline-block;
    padding: 8px 12px;
    border: 1px solid var(--line);
    background: #111111;
    color: #f7f7f2;
    text-decoration: none;
    font-size: 0.75rem;
    letter-spacing: 0.14rem;
    text-transform: uppercase;
    cursor: pointer;
  }

  .reset-btn:hover,
  .verify-link:hover {
    background: #fff;
    color: var(--ink);
  }

  .disclaimer {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    color: var(--muted);
    font-size: 0.72rem;
    line-height: 1.45;
    position: relative;
    z-index: 1;
  }

  .error {
    margin-top: 16px;
    padding: 12px;
    border: 1px solid var(--red);
    color: var(--red);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.12rem;
    background: rgba(17, 17, 17, 0.06);
  }

  @media (max-width: 680px) {
    .header { flex-direction: column; }
    .meta { text-align: left; }
    .summary-grid,
    .detail-grid,
    .evidence-grid { grid-template-columns: 1fr; }
    .report-head { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <section class="case-file">
      <header class="header">
        <div class="brand">
          <h1>DeepLence</h1>
          <div class="tagline">Forensic Media Desk // Case File Intake</div>
        </div>
        <div class="meta">
          <div>Case No. 001</div>
          <div>Evidence Portal</div>
          <div class="stamp">Classified</div>
        </div>
      </header>

      <div class="main">
        <div class="dropzone" id="dropzone">
          <div class="folder">
            <span class="folder-icon">▣</span>
            <span>Evidence Intake</span>
          </div>
          <strong>Drop an image or video into the file docket</strong>
          <p>or click to browse // JPG, PNG, WEBP, MP4, MOV supported</p>
          <input type="file" id="fileInput" accept="image/*,video/*">
        </div>

        <div id="previewArea"></div>
        <div id="loadingArea"></div>
        <div id="resultArea"></div>
        <div id="errorArea"></div>
      </div>
    </section>
  </div>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const previewArea = document.getElementById('previewArea');
const loadingArea = document.getElementById('loadingArea');
const resultArea = document.getElementById('resultArea');
const errorArea = document.getElementById('errorArea');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) handleFile(fileInput.files[0]);
});

function colorForScore(pct) {
  if (pct >= 70) return getComputedStyle(document.documentElement).getPropertyValue('--red');
  if (pct >= 45) return getComputedStyle(document.documentElement).getPropertyValue('--amber');
  return getComputedStyle(document.documentElement).getPropertyValue('--green');
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>'"]/g, char => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
  }[char]));
}

function handleFile(file) {
  resultArea.innerHTML = '';
  errorArea.innerHTML = '';
  previewArea.innerHTML = '';

  const url = URL.createObjectURL(file);
  const isVideo = file.type.startsWith('video');
  previewArea.innerHTML = `<div class="preview">${
    isVideo ? `<video src="${url}" controls></video>` : `<img src="${url}">`
  }</div>`;

  loadingArea.innerHTML = `
    <div class="loading-panel">
      <div class="loading-title">[ Examination in progress ]</div>
      <div class="loading-bars"><span></span><span></span><span></span><span></span><span></span></div>
      <div class="loading-copy">Processing ${isVideo ? 'video frames' : 'image evidence'} // running forensic signals</div>
    </div>`;

  const formData = new FormData();
  formData.append('file', file);

  fetch('/analyze', { method: 'POST', body: formData })
    .then(async res => {
      if (!res.ok) {
        const err = await res.json().catch(() => ({detail: 'Analysis failed'}));
        throw new Error(err.detail || 'Analysis failed');
      }
      return res.json();
    })
    .then(renderResult)
    .catch(err => {
      errorArea.innerHTML = `<div class="error">[ Analysis Error ] ${escapeHtml(err.message)}</div>`;
    })
    .finally(() => { loadingArea.innerHTML = ''; });
}

function meterMarkup(pct, color) {
  return `
    <div class="risk-meter">
      <div class="meter-track">
        <div class="meter-fill" style="width:${pct}%; background:${color}"></div>
      </div>
      <div class="meter-labels">
        <span>Low</span><span>Medium</span><span>High</span>
      </div>
    </div>`;
}

function renderResult(data) {
  const pct = data.ai_probability_percent;
  const color = (data.trained_detector_used || data.provenance?.declared_ai_generation)
    ? colorForScore(pct)
    : getComputedStyle(document.documentElement).getPropertyValue('--amber');
  const verdict = data.verdict;
  const suitability = data.image_suitability;
  const provenanceVerified = data.risk_basis === 'verified_signed_ai_provenance';
  const externalDetector = data.risk_basis === 'sightengine_genai_api';
  const meterLabel = provenanceVerified ? 'Verified Origin' : 'Synthetic Risk';
  const statusLabel = pct >= 70 ? 'High Priority Review' : pct >= 45 ? 'Pending Review' : 'Routine Review';
  const confidenceLabel = data.confidence || 'low';
  const summaryText = data.media_type === 'video'
    ? `This examination reviewed the submitted ${data.media_type} sample and consolidated the available forensic evidence into a structured assessment.`
    : `This examination reviewed the submitted ${data.media_type} sample and consolidated the available forensic evidence into a structured assessment.`;

  const provenance = data.provenance || {};
  const issuer = (provenance.issuer_hints || []).join(', ');
  const provenanceStatus = escapeHtml(provenance.status || 'not checked');
  const provenanceNote = escapeHtml(provenance.note || 'No provenance conclusion was made.');
  const metadataStatus = suitability && suitability.shortest_edge >= 128 ? 'Available' : 'Limited';
  const provenanceSummary = provenance.declared_ai_generation
    ? 'Declared AI provenance was surfaced by the validator report.'
    : 'No verified provenance was established. This does not imply authenticity or manipulation; it means the evidence was unavailable or not validated.';

  const providerEvidence = data.provider_evidence;
  const fingerprintRows = (providerEvidence?.generator_scores || []).map(item => {
    const value = Math.round(item.score * 100);
    return `<div class="fingerprint-row">
      <span>${escapeHtml(item.generator.replace(/_/g, ' '))}</span>
      <div class="fingerprint-track"><div class="fingerprint-fill" style="width:${value}%"></div></div>
      <strong>${value}%</strong>
    </div>`;
  }).join('');

  const findings = [
    { label: 'Pixel Analysis', status: 'Completed', note: 'Visual signal review completed.' },
    { label: 'Metadata Inspection', status: metadataStatus === 'Available' ? 'Completed' : 'Warning', note: suitability ? suitability.notes[0] : 'Metadata review inconclusive.' },
    { label: 'Generator Fingerprint Analysis', status: providerEvidence ? 'Completed' : 'Unavailable', note: providerEvidence ? 'Provider generator confidence was returned.' : 'No generator fingerprint data was returned.' },
    { label: 'Noise Analysis', status: 'Completed', note: 'Residual texture patterns were reviewed.' },
    { label: 'Frequency Analysis', status: 'Completed', note: 'Spectrum consistency was reviewed.' },
    { label: 'AI Model Assessment', status: data.trained_detector_used ? 'Completed' : 'Unavailable', note: data.trained_detector_used ? 'Model-based assessment was available.' : 'No trained detector was available for this file.' }
  ];

  const findingsHtml = findings.map(item => `
    <div class="finding-item">
      <span class="finding-label">${escapeHtml(item.label)}</span>
      <span class="status-badge ${item.status.toLowerCase() === 'warning' ? 'warning' : item.status.toLowerCase() === 'unavailable' ? 'unavailable' : 'completed'}">${escapeHtml(item.status)}</span>
    </div>
    <div class="summary-text">${escapeHtml(item.note)}</div>`).join('');

  const signals = data.signals || {};
  const evidenceItems = [];
  evidenceItems.push({
    type: 'Overall Risk',
    finding: verdict,
    confidence: confidenceLabel,
    notes: `${pct}% synthetic-risk estimate based on the available forensic evidence.`
  });
  evidenceItems.push({
    type: 'Provenance',
    finding: provenanceStatus,
    confidence: provenance.declared_ai_generation ? 'high' : 'low',
    notes: provenanceSummary + (issuer ? ` Issuer hints: ${issuer}` : '')
  });
  if (providerEvidence) {
    evidenceItems.push({
      type: 'Provider Evidence',
      finding: `${escapeHtml(providerEvidence.provider)} · ${escapeHtml(providerEvidence.method)}`,
      confidence: 'medium',
      notes: providerEvidence.note || 'No additional provider note was returned.'
    });
  }
  for (const [key, val] of Object.entries(signals)) {
    if (!val || typeof val.score !== 'number') continue;
    const sPct = Math.round(val.score * 100);
    const signalConfidence = sPct >= 70 ? 'high' : sPct >= 45 ? 'medium' : 'low';
    const notes = (val.notes || []).join(' ');
    evidenceItems.push({
      type: key.replace(/_/g, ' '),
      finding: `${sPct}%`,
      confidence: signalConfidence,
      notes: notes || 'No additional note was returned for this signal.'
    });
  }

  const evidenceHtml = evidenceItems.map((item, index) => `
    <article class="evidence-entry">
      <div class="evidence-header">
        <div class="evidence-title">Evidence #${String(index + 1).padStart(2, '0')}</div>
        <div class="evidence-meta">${escapeHtml(item.type)}</div>
      </div>
      <div class="evidence-grid">
        <div class="field">
          <span>Type</span>
          <strong>${escapeHtml(item.type)}</strong>
        </div>
        <div class="field">
          <span>Finding</span>
          <strong>${escapeHtml(item.finding)}</strong>
        </div>
        <div class="field">
          <span>Confidence</span>
          <strong>${escapeHtml(item.confidence)}</strong>
        </div>
        <div class="field">
          <span>Notes</span>
          <strong>${escapeHtml(item.notes)}</strong>
        </div>
      </div>
    </article>`).join('');

  const readinessHtml = suitability ? `<div class="readiness"><strong>Analysis coverage //</strong> ${escapeHtml(suitability.notes[0])}</div>` : '';

  resultArea.innerHTML = `
    <div class="result dossier">
      <div class="report-head">
        <div>
          <div class="report-kicker">DeepLence • Digital Media Forensics</div>
          <h2>Investigation Report</h2>
        </div>
        <div class="stamp-stack">
          <div class="stamp">Case File Open</div>
          <div class="stamp warning">${escapeHtml(statusLabel)}</div>
        </div>
      </div>

      <section class="case-summary">
        <h3>Case Summary</h3>
        <div class="summary-grid">
          <div>
            <span>Investigation Status</span>
            <strong>${escapeHtml(statusLabel)}</strong>
          </div>
          <div>
            <span>AI Risk Level</span>
            <strong>${escapeHtml(meterLabel)}</strong>
          </div>
          <div>
            <span>Confidence</span>
            <strong>${escapeHtml(confidenceLabel)}</strong>
          </div>
          <div>
            <span>Assessment</span>
            <strong style="color:${color}">${escapeHtml(verdict)}</strong>
          </div>
        </div>
        <p class="summary-text">${escapeHtml(summaryText)}</p>
        ${meterMarkup(pct, color)}
        ${readinessHtml}
      </section>

      <div class="dossier-grid" style="display:grid; gap:16px; margin-top:16px;">
        <section class="dossier-card">
          <h3>Chain of Custody</h3>
          <div class="detail-grid">
            <div>
              <span>C2PA Verification</span>
              <strong>${provenanceStatus}</strong>
            </div>
            <div>
              <span>Metadata Availability</span>
              <strong>${escapeHtml(metadataStatus)}</strong>
            </div>
            <div>
              <span>Provenance Findings</span>
              <strong>${escapeHtml(provenance.declared_ai_generation ? 'Declared AI provenance found' : 'No verified provenance established')}</strong>
            </div>
            <div>
              <span>Evidence Note</span>
              <strong>${escapeHtml(provenanceSummary)}</strong>
            </div>
          </div>
        </section>

        <section class="dossier-card">
          <h3>Forensic Findings</h3>
          <div class="findings-list">
            ${findingsHtml}
          </div>
        </section>
      </div>

      <section class="dossier-card">
        <h3>Evidence Log</h3>
        <div class="evidence-list">
          ${evidenceHtml}
        </div>
      </section>

      <section class="dossier-card">
        <h3>Final Assessment</h3>
        <p>This assessment is based on the available forensic evidence, including the submitted media characteristics, provenance signals, and technical analysis outputs.</p>
        <p>Evidence that was found is recorded above. Evidence that was not found or not validated is also noted so the conclusion remains transparent rather than absolute.</p>
        <p>This report is an evidence-based investigation summary, not a cryptographic proof of authenticity or manipulation.</p>
      </section>

      <div class="disclaimer">
        ${(data.analysis_limitations || [
          'This is a forensic risk estimate, not proof that media is real or AI-generated.',
          'Missing metadata is neutral because it is commonly removed by platforms and editors.'
        ]).join(' ')}
      </div>
      <div class="actions">
        <button class="reset-btn" onclick="location.reload()">Analyze another file</button>
        <a class="verify-link" href="https://openai.com/verify" target="_blank" rel="noopener">Verify possible OpenAI origin</a>
      </div>
    </div>`;
}
</script>
</body>
</html>
